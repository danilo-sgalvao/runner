name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Testes unitários (shared + assinatura + simulador)
        run: |
          cd projetos/shared && go test ./...
          cd ../assinatura && go test ./...
          cd ../simulador && go test ./...

      - name: Compilar assinatura (3 plataformas)
        run: |
          cd projetos/assinatura
          GOOS=windows GOARCH=amd64 go build -o ../../assinatura-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -o ../../assinatura-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -o ../../assinatura-darwin-amd64 .

      - name: Compilar simulador (3 plataformas)
        run: |
          cd projetos/simulador
          GOOS=windows GOARCH=amd64 go build -o ../../simulador-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -o ../../simulador-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -o ../../simulador-darwin-amd64 .

      - name: Salvar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: binarios
          path: |
            assinatura-windows-amd64.exe
            assinatura-linux-amd64
            assinatura-darwin-amd64
            simulador-windows-amd64.exe
            simulador-linux-amd64
            simulador-darwin-amd64

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build do assinador.jar
        run: cd projetos/assinador-java && mvn package -q

      - name: Testes de integração
        run: cd projetos/assinatura && go test -tags integration ./cmd/
