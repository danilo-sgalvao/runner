name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Compilar para Windows
        run: cd projetos/assinatura && GOOS=windows GOARCH=amd64 go build -o ../../assinatura-windows-amd64.exe .

      - name: Compilar para Linux
        run: cd projetos/assinatura && GOOS=linux GOARCH=amd64 go build -o ../../assinatura-linux-amd64 .

      - name: Compilar para macOS
        run: cd projetos/assinatura && GOOS=darwin GOARCH=amd64 go build -o ../../assinatura-darwin-amd64 .

      - name: Salvar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: binarios
          path: |
            assinatura-windows-amd64.exe
            assinatura-linux-amd64
            assinatura-darwin-amd64

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build do assinador.jar
        run: cd projetos/assinador-java && mvn package -q

      - name: Testes de integração
        run: cd projetos/assinatura && go test -tags integration ./cmd/