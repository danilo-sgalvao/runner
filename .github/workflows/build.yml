name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Compilar para Windows
        run: GOOS=windows GOARCH=amd64 go build -o assinatura-windows-amd64.exe .

      - name: Compilar para Linux
        run: GOOS=linux GOARCH=amd64 go build -o assinatura-linux-amd64 .

      - name: Compilar para macOS
        run: GOOS=darwin GOARCH=amd64 go build -o assinatura-darwin-amd64 .

      - name: Salvar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: binarios
          path: |
            assinatura-windows-amd64.exe
            assinatura-linux-amd64
            assinatura-darwin-amd64